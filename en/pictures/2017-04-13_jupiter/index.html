<!doctype html>
<html>
  <style>
    :root {
      --primary-color: #3e8eae;
      --secondary-color: #fc0;
      --text-color: #fff;
      --background-color: #14141e;
      --banner-background-color: #282832;
    }
    .banner {
      background-color: var(--banner-background-color);
      justify-content: space-between;
      align-items: center;
      width: 100%;
      height: 60px;
      display: flex;
      position: fixed;
      top: 0;
      left: 0;
    }
    .banner-titles {
      text-align: center;
      flex-grow: 1;
    }
    .banner-title {
      color: orange;
      margin-top: 5px;
      margin-bottom: 5px;
    }
    .banner-subtitle {
      margin-top: 5px;
    }
    .language-selector {
      appearance: none;
      background-color: var(--banner-background-color);
      color: #fff;
      border: 1px solid #555;
      border-radius: 5px;
      margin-right: 10px;
      padding: 10px;
    }
    .content {
      margin-top: 70px;
    }
    body {
      color: #969696;
      background-color: var(--background-color);
    }
    .thumbnail {
      cursor: pointer;
    }
    .custom-button {
      color: #eee;
      cursor: pointer;
      background-color: #333;
      border: none;
      border-radius: 5px;
      margin-bottom: 10px;
      margin-right: 10px;
      padding: 10px 20px;
      font-size: 14px;
      transition: background-color 0.3s;
    }
    .custom-button:hover {
      background-color: #555;
    }
    .invisible-link {
      color: inherit;
      text-decoration: none;
    }
    .image-container {
      justify-content: center;
      align-items: center;
      max-width: 100%;
      height: 100vh;
      display: flex;
    }
    .image-container img {
      max-width: 90%;
      max-height: 100%;
    }
    .close-button {
      cursor: pointer;
      color: #fff;
      position: absolute;
      top: 10px;
      right: 10px;
    }
    .borderless-table {
      border-collapse: collapse;
    }
    .borderless-table td {
      border: none;
      padding: 5px;
    }
  </style>
  <body>
    <div class="banner">
      <div class="banner-titles">
        <h2 class="banner-title">
          <a class="invisible-link" href="/en/">Metastro</a>
        </h2>
      </div>
      <select class="language-selector" id="language-selector">
        <option value="en" selected>English</option>
        <option value="fr">Français</option></select
      ><langage-selector
        data-newenurl="/en/pictures/2017-04-13_jupiter/"
        data-newfrurl="/fr/pictures/2017-04-13_jupiter/"
      ></langage-selector>
      <script type="module">
        var e = class extends HTMLElement {
          constructor() {
            super();
            let e = this.dataset.newfrurl,
              t = this.dataset.newenurl;
            document
              .getElementById(`language-selector`)
              .addEventListener(`change`, function () {
                var n = this.options[this.selectedIndex];
                n.value === `fr`
                  ? (window.location.href = e)
                  : n.value === `en` && (window.location.href = t);
              }),
              console.log(`after`);
          }
        };
        customElements.define(`langage-selector`, e);
      </script>
    </div>
    <div class="content">
      <button class="custom-button" id="return-button">Return</button
      ><a
        href="https://lh3.googleusercontent.com/d/1QZ-x2_NXLiWucw_oh0DH11LUYd-St_Qo"
        ><button class="custom-button" id="full-size-button">
          Full size
        </button></a
      >
      <script type="module">
        document
          .getElementById(`return-button`)
          .addEventListener(`click`, function () {
            window.history.back();
          });
      </script>
      <div class="image-container">
        <img
          crossorigin="anonymous"
          class="fullSizeImage"
          src="https://lh3.googleusercontent.com/d/1QZ-x2_NXLiWucw_oh0DH11LUYd-St_Qo"
        />
      </div>
      <table class="borderless-table">
        <tr>
          <td>Acquisition date</td>
          <td id="acquisition-date">Apr 13, 2017</td>
        </tr>
        <tr>
          <td>Description</td>
          <td id="description">
            Une Jupiter très détaillée, malheureusement extraite d&#39;une vidéo
            sous-exposée, avec une couleur tirant trop sur le orange (focale
            4m).
          </td>
        </tr>
        <tr>
          <td>Tags</td>
          <td>
            <a href="/en/tags/jupiter/">jupiter</a>&nbsp;<a
              href="/en/tags/planetary/"
              >planetary</a
            >&nbsp;
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
